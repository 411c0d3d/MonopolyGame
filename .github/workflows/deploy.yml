name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name monopoly411

      - name: Build and push Docker image
        run: |
          docker build -t monopoly411.azurecr.io/monopoly-online:${{ github.sha }} .
          docker push monopoly411.azurecr.io/monopoly-online:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name monopoly-game \
            --resource-group monopoly \
            --image monopoly411.azurecr.io/monopoly-online:${{ github.sha }}
